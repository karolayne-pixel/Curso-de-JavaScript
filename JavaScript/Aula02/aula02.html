<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Variáveis JavaScript</title>
</head>
<body>
    <h2>variáveis</h2>
    <p id="demo"></p>

    <script>
        let idade = 18;
        let nome = "Pedro";

        document.getElementById("demo").innerHTML = "A idade de " + nome + " é " + idade + " anos";
    </script>
</body>
</html>
