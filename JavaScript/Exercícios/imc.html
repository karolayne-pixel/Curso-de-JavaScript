<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de IMC</title>
</head>
<body>
    <label>Seu peso:</label>
    <input type="number" id="peso"> <br>
    
    <label>Sua altura:</label>
    <input type="number" id="altura"> <br>
    
    <button onclick="calcular()">Calcular IMC</button>
    
    <p id="resultado"></p>

    <script>
        function calcular() {
            let peso = Number(document.getElementById('peso').value);
            let altura = Number(document.getElementById('altura').value);
            let campoResultado = document.getElementById('resultado');
            
            let imc = peso / (altura * altura);
            
            let imcFormatado = imc.toFixed(2);
            let classificacao = "";

            if (imc < 18.5) {
                classificacao = "Abaixo do peso";
            } else if (imc >= 18.6 && imc < 25) {
                classificacao = "Peso ideal";
            } else if (imc >= 25 && imc < 30) {
                classificacao = "Levemente acima do peso";
            } else if (imc >= 30 && imc < 35) {
                classificacao = "Obesidade grau 1";
            } else if (imc >= 35 && imc < 40) {
                classificacao = "Obesidade grau 2";
            } else {
                classificacao = "Obesidade grau 3";
            }

            campoResultado.innerHTML = `Seu IMC é ${imcFormatado}: ${classificacao}`;
        }
    </script>
</body>
</html>
