<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercícios</title>
</head>
<body>
    <h3>for</h3>
    <p id="for"></p>

    <h3>while</h3>
    <p id="while"></p>

    <script>
        let test = "";
        for (let conte = 1; conte <= 200; conte++) {
            test = test + conte + "<br>"; 
        }
        document.getElementById('for').innerHTML = test; [3]

        let i = 1;
        let rest = "";
        while (i <= 200) {
            rest = rest + i + "<br>";
            i++; 
        }
        document.getElementById('while').innerHTML = rest; [4]
    </script>
</body>
</html>
